en:
  dry_validation:
    errors:
      invalid_phone_number: is not a valid phone number
      password_mismatch: does not match password
  flash:
    passwords:
      invalid_token: Password reset link is invalid or has expired.
      reset: Password has been reset.
      sent: >-
        Password reset instructions sent (if an account with that email
        address exists).
      throttled: Try again later.
    posts:
      published: Post published.
    profiles:
      updated: Profile updated.
    registrations:
      created: Welcome to Kintide!
    sessions:
      invalid_credentials: Try another email address or password.
      throttled: Try again later.
    subscriptions:
      accepted: That invitation was already accepted.
      created: You’re in! You’ll get a text for every new update.
      deactivated: You’ve unsubscribed.
      invited: Invitation sent.
      removed: Invitation removed.
  passwords_mailer:
    reset:
      subject: Reset your password
  sms:
    shares:
      deliver: '%{author} posted an update to %{circle}: %{url}'
    subscriptions:
      invite: >-
        %{inviter} invited you to follow %{circle} on Kintide. Accept
        here: %{url}
